<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: rgb(120, 96, 64);
    font-family: Georgia, serif;

    display: grid;
    place-items: center;
    min-height: 100vh;
}

#formContainer {
    width: 420px;
    background: #e6e6e6;
    border-radius: 25px;
    border: 8px solid #153c8a;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    padding: 30px;
    position: relative;
}


#jesus {
    max-width: 100%;
    overflow: hidden;
    grid-row: 1/4;
}

#header {
    background-image: url("images/jesus_feeds_5000.jpeg");
    background-size: cover;
}

#formContainer h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 2rem;
    color: white;
}

#formContainer h3 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.3rem;
    color: white;
}

#myForm {
    display: grid;
    grid-template-columns: 120px 1fr;

    gap: 12px 15px;
    align-items: center;
}


#myForm section,
#myForm div,
#myForm button[type="submit"] {
    grid-column: span 2;
}

input[type="text"],
input[type="password"],
input[type="email"] {
    padding: 8px;
    border: 1px solid #999;
    border-radius: 4px;
    width: 100%;
}

#myForm div {
    display: grid;
    grid-auto-flow: column;
    justify-content: start;
    gap: 10px;
}

section {
    display: grid;
    grid-auto-flow: column;
    justify-content: start;
    gap: 8px;
}

button[type="submit"] {
    padding: 8px 15px;
    border: 1px solid #666;
    background: #ddd;
    border-radius: 4px;
    justify-self: center;
    cursor: pointer;
}

button[type="submit"]:hover {
    background: #ccc;
}

#closeBtn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    border: 1px solid #999;
    padding: 3px 6px;
    cursor: pointer;
    font-weight: bold;
}
    </style>




</head>


<body>
    <div id="formContainer">
        <div id="header">
        <h2>Daily Feed</h2>
        <h3>Scripture a Day</h3></div>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
    </div>

    <div id="output"></div>


    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
